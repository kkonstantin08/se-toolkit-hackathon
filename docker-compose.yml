services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-plansync}
      POSTGRES_USER: ${POSTGRES_USER:-plansync}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-plansync}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-plansync} -d ${POSTGRES_DB:-plansync}"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://plansync:plansync@db:5432/plansync}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173,http://localhost:8080}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${API_BASE_URL:-/api/v1}
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
